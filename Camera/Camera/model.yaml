Camera:
  description: "Smart traffic camera entity used for monitoring traffic conditions at an intersection."
  type: object

  properties:

    id:
      description: "Unique identifier of the entity."
      type: string
      format: uri

    type:
      description: "Entity type. It must be Camera."
      type: string
      enum:
        - Camera

    cameraName:
      description: "Human-readable name of the camera."
      type: string

    cameraType:
      description: "Physical type of the camera."
      type: string
      enum:
        - FIXED
        - PTZ
        - DOME

    cameraUsage:
      description: "Purpose of the camera."
      type: string
      enum:
        - TRAFFIC

    cameraStatus:
      description: "Operational status of the camera."
      type: string
      enum:
        - ONLINE
        - OFFLINE
        - ERROR
        - MAINTENANCE

    location:
      description: "Geographical location of the camera."
      $ref: "https://geojson.org/schema/Point.json"

    vehicleCount:
      description: "Current number of detected vehicles."
      type: integer
      minimum: 0

    trafficDensity:
      description: "Traffic density detected by the camera."
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH

    congestionLevel:
      description: "Estimated congestion level."
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - SEVERE

    incidentDetected:
      description: "Whether an incident is currently detected."
      type: boolean

    incidentCount:
      description: "Total number of incidents detected."
      type: integer
      minimum: 0

    minorAccidentCount:
      description: "Number of minor accidents detected."
      type: integer
      minimum: 0

    laneBlockedCount:
      description: "Number of blocked lanes."
      type: integer
      minimum: 0

    roadClosedCount:
      description: "Number of road closures detected."
      type: integer
      minimum: 0

    recommendedSignalAction:
      description: "Suggested traffic light action based on camera analysis."
      type: string
      enum:
        - KEEP
        - EXTEND_GREEN
        - SHORTEN_GREEN
        - EMERGENCY

    lastUpdate:
      description: "Timestamp of the latest camera update."
      type: string
      format: date-time

    refIntersection:
      description: "Reference to the monitored intersection."
      type: string
      format: uri

  required:
    - id
    - type
    - cameraStatus
    - vehicleCount
    - refIntersection
    - lastUpdate