insertion_policy:
  source_type: DESIGN_DECISION
  calibrated: false
  scheduler: deterministic_bucket
  max_retries: 3
  retry_backoff_s: 0.5
  max_pending_per_source: 40
  demand_seed: 42

context_derivation:
  source_type: HEURISTIC
  calibrated: false
  aggregate_rule:
    type: worst_state
    # weighted:
    #   weights_by_context:
    #     FREE_FLOW: 0.0
    #     STABLE: 1.0
    #     BUSY: 2.0
    #     CONGESTED: 3.0
    #     OVERSATURATED: 4.0
  hysteresis_s: 8.0
  recovery_s: 12.0
  # Traffic-load axis only (phenomena are separate booleans)
  traffic_state_order:
    - FREE_FLOW
    - STABLE
    - BUSY
    - CONGESTED
    - OVERSATURATED
  severity_order:
    - FREE_FLOW
    - STABLE
    - BUSY
    - CONGESTED
    - OVERSATURATED
  direction_pcu_busy: 15
  direction_pcu_congested: 35
  direction_pcu_oversaturated: 55

causal_inference:
  source_type: HEURISTIC
  calibrated: false
  causal_observation_window_s: 45.0
  propagation_min_delay_s: 5.0
  propagation_max_delay_s: 120.0
  default_cause_confidence: 1.0

local_overlay_types:
  accident:
    priority: 100
    default_segment_role: incoming_approach
    lane0_disallow: true
    other_lanes_speed_mps: 2.0
  blocked_intersection:
    priority: 100
    default_segment_role: incoming_approach
    lane0_disallow: true
    other_lanes_speed_mps: 2.0
  downstream_restriction:
    priority: 50
    default_segment_role: downstream_exit
    speed_factor: 0.15
    lane0_disallow: true
  heavy_rain:
    priority: 10
    scope: corridor_edges
    edge_speed_factor: 0.65
  emergency:
    priority: 90
    insert_vtype: ambulance
    interval_s: 90

demo_profile:
  id: demo_visual
  source_type: EXPERIMENTAL
  calibrated: false
  auto_sequence:
    - { action: demand_profile, profile: normal, dwell_s: 60 }
    - { action: demand_profile, profile: morning_peak, dwell_s: 90 }
    - { action: overlay, type: accident, intersection_id: B, direction: West, segment_role: incoming_approach, dwell_s: 90 }
    - { action: overlay, type: downstream_restriction, intersection_id: B, direction: West, segment_role: downstream_exit, dwell_s: 90 }
    - { action: overlay, type: emergency, intersection_id: C, dwell_s: 90 }
  gui_delay_ms_hint: 100

scenarios:
  profile_id: experimental_scenario_scales_v1
  source_type: EXPERIMENTAL
  calibrated: false
  # Legacy scales kept for compat facade docs only — demand must NOT use setScale.
  traffic_scale:
    normal: 1.0
    morning_peak: 1.0
    evening_peak: 1.0
    rain: 1.0
    heavy_rain: 1.0
    accident: 1.0
    emergency: 1.0
    blocked_intersection: 1.0
    spillback: 1.0
    oversaturated: 1.0
  speed_factor:
    normal: 1.0
    morning_peak: 1.0
    evening_peak: 1.0
    rain: 1.0
    heavy_rain: 1.0
    accident: 1.0
    emergency: 1.0
    blocked_intersection: 1.0
    spillback: 1.0
    oversaturated: 1.0
  description: "Legacy scenario scale table deprecated for demand; hybrid actuators own effects."

metrics_provenance:
  pcu_equivalent:
    source_type: PROJECT_DERIVED
    derivation_kind: COMPUTED
  traffic_status:
    source_type: PROJECT_DERIVED
    derivation_kind: CLASSIFIED
  density:
    source_type: PROJECT_DERIVED
    derivation_kind: CLASSIFIED
    semantic_name: Traffic_Load_Class
    note: "Approach PCU count bins; NOT traffic density PCU/km."
  average_speed_kmh:
    source_type: PROJECT_DERIVED
    derivation_kind: AGGREGATED
  theoretical_speed_kmh:
    source_type: PROJECT_DERIVED
    derivation_kind: COMPUTED
  intersection_box_blocked:
    source_type: HEURISTIC
    derivation_kind: ESTIMATED
  yellow_commitment_count:
    source_type: HEURISTIC
    derivation_kind: ESTIMATED
  vehicles_blocked_at_entry:
    source_type: HEURISTIC
    derivation_kind: ESTIMATED
  moto_front_pct:
    source_type: HEURISTIC
    derivation_kind: ESTIMATED
  occupancy_pct:
    source_type: SUMO_NATIVE
  queue_length_m:
    source_type: SUMO_NATIVE
    note: "Stop-line E2 jam (max across lanes); not full-link spillback."
  queue_length_vehicles:
    source_type: PROJECT_DERIVED
    derivation_kind: COMPUTED
  storage_utilization_lane:
    source_type: PROJECT_DERIVED
    derivation_kind: COMPUTED
