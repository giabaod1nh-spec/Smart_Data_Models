# pytest.ini — Phase 3.0 marker taxonomy
[pytest]
testpaths = tests
markers =
    sumo: requires SUMO binary + TraCI (or real SUMO subprocess load)
    slow: long-running simulation (>~30s wall or multi-minute sim)
    orion: requires live Orion-LD Context Broker
    fault: fault-injection / negative-path
    phase3: Phase 3 validation suite
filterwarnings =
    ignore::DeprecationWarning
