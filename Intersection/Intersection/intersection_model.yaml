openapi: 3.0.0

info:
  title: Intersection Smart Data Model
  description: Base Model Definitions from Smart Data Models
  version: "1.1.0"

paths:
  /ngsi-ld/v1/entities:
    get:
      summary: Get Intersection entities
      responses:
        "200":
          description: OK
          content:
            application/ld+json:
              schema:
                $ref: "#/components/schemas/Intersection"

components:
  schemas:
    Intersection:
      description: >
        Data Model for a road intersection in a Smart Traffic
        Simulation System (NGSI-LD / FIWARE Orion).

      type: object

      required:
        - id
        - type
        - location
        - intersectionStatus

      properties:
        id:
          description: Unique identifier.
          type: string
          example: urn:ngsi-ld:Intersection:Intersection001

        type:
          type: string
          enum:
            - Intersection

        name:
          description: Display name.
          type: string
          example: Nguyen Trai - Le Loi

        description:
          description: Description of the intersection.
          type: string

        location:
          description: GeoJSON Point.

          type: object

          properties:
            type:
              type: string
              enum:
                - Point

            coordinates:
              type: array

              minItems: 2

              items:
                type: number

          required:
            - type
            - coordinates

        dateCreated:
          type: string
          format: date-time

        dateModified:
          type: string
          format: date-time

        intersectionStatus:
          description: Operational status.
          type: string

          enum:
            - ACTIVE
            - MAINTENANCE
            - MALFUNCTION
            - POWER_OUTAGE

          default: ACTIVE

        numberOfApproaches:
          description: Number of roads connected.
          type: integer
          minimum: 3
          example: 4

        frequentCongestion:
          description: Frequently congested.
          type: boolean
          default: false

        refTrafficLights:
          description: Related traffic lights.

          type: array

          items:
            type: string
            format: uri

        refCameras:
          description: Related cameras.

          type: array

          items:
            type: string
            format: uri

        refVehicleSensors:
          description: Related vehicle sensors.

          type: array

          items:
            type: string
            format: uri

        dateObserved:
          description: Last aggregation timestamp.
          type: string
          format: date-time

        overallTrafficStatus:
          description: Overall traffic condition.

          type: string

          enum:
            - FREE_FLOW
            - LIGHT
            - MODERATE
            - HEAVY
            - CONGESTED

          example: MODERATE

        totalVehicleCount:
          description: Total vehicles detected.
          type: integer
          minimum: 0
          example: 215

        hasActiveIncident:
          description: Indicates whether any incident is active.
          type: boolean
          default: false

      x-derived-from: https://smart-data-models.github.io

      x-disclaimer: >
        Adapted for the graduation project
        "Xây dựng hệ thống mô phỏng giao thông thông minh
        sử dụng NGSI-LD và REST API".

      x-version: "1.1.0"
