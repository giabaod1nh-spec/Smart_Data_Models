Camera:
  description: "Mô hình thực thể Camera giám sát và phân tích AI (Computer Vision) tại ngã tư."
  properties:
    id:
      description: "Định danh duy nhất của thực thể Camera"
      type: string
    type:
      description: "Loại thực thể NGSI-LD"
      type: string
      enum:
        - Camera
    vehicleCount:
      description: "Tổng số xe nhận diện được trong toàn bộ khung hình"
      type: integer
      minimum: 0
    incidentDetected:
      description: "Cờ báo hiệu có phát hiện sự cố từ hình ảnh hay không"
      type: boolean
    incidentCount:
      description: "Tổng số sự cố đang ghi nhận trong khung hình"
      type: integer
      minimum: 0
    minorAccidentCount:
      description: "Phân loại AI: Số vụ va chạm nhẹ"
      type: integer
      minimum: 0
    laneBlockedCount:
      description: "Phân loại AI: Số làn đường đang bị chặn"
      type: integer
      minimum: 0
    roadClosedCount:
      description: "Phân loại AI: Số tuyến đường đang bị phong tỏa"
      type: integer
      minimum: 0
    cameraStatus:
      description: "Trạng thái kết nối của luồng stream camera"
      type: string
      enum: [ONLINE, OFFLINE, ERROR]
    lastUpdate:
      description: "Thời gian xử lý khung hình (frame) gần nhất"
      type: string
      format: date-time
    refIntersection:
      description: "Mối quan hệ trỏ về Giao lộ chứa camera này"
      type: string
      format: uri
  required:
    - id
    - type
    - refIntersection